name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prod resource names (single environment).
env:
  PROJECT: procureiq
  ENVIRONMENT: prod
  RESOURCE_GROUP: rg-procureiq-prod
  CONTAINER_APP: ca-procureiq-backend-prod
  IMAGE_NAME: procureiq-backend

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Lint
        working-directory: backend
        run: uv run ruff check .

      - name: Test
        working-directory: backend
        run: uv run pytest tests/ || [ $? -eq 5 ]

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    # Only push images on main; PRs build for validation only.
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        if: github.ref == 'refs/heads/main'
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build image
        run: docker build ./backend --tag "${IMAGE_TAG}" --tag "${IMAGE_LATEST}"
        env:
          IMAGE_TAG: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push "${IMAGE_TAG}"
          docker push "${IMAGE_LATEST}"
        env:
          IMAGE_TAG: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
            -backend-config="key=${TF_BACKEND_KEY}"
        env:
          TF_BACKEND_RESOURCE_GROUP: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
          TF_BACKEND_STORAGE_ACCOUNT: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
          TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
          TF_BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}
          ARM_USE_CLI: "true"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve
        env:
          ARM_USE_CLI: "true"
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_dynatrace_env_url: ${{ secrets.DT_ENV_URL }}

      - name: Roll out new image to Container App
        run: |
          az containerapp update \
            --name "${CONTAINER_APP}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${{ github.sha }}"
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
